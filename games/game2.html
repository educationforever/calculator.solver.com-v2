<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Answers</title>
  <style>
    .page-title {
      color: white;
      font-size: 50px;
      margin-bottom: 30px;
      font-family: Arial, sans-serif;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #fullscreenBtn {
      margin-bottom: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .game-container {
      width: 900px;
      height: 550px;
    }

    .game-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<h1 class="page-title">Drift King</h1>

<button id="fullscreenBtn">Fullscreen</button>

<div class="game-container" id="gameContainer">
  <iframe 
    data-testid="test_app_frame"
    id="test_app_frame"
    name="appFrame"
    allowfullscreen
    allow="autoplay; fullscreen; camera; focus-without-user-activation *; monetization; gamepad; keyboard-map *; xr-spatial-tracking; clipboard-write"
    scrolling="no"
    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups=false allow-popups-to-escape-sandbox=false allow-presentation allow-scripts allow-same-origin allow-downloads"
    src="https://db2.ducklit.com/2024/unity/drift-king/pre.html"
  ></iframe>
</div>

<script>
const container = document.getElementById("gameContainer");
const button = document.getElementById("fullscreenBtn");

button.addEventListener("click", () => {
  if (!document.fullscreenElement) {
    container.requestFullscreen();
    button.textContent = "Exit Fullscreen";
  } else {
    document.exitFullscreen();
    button.textContent = "Fullscreen";
  }
});
</script>

</body>
</html>
